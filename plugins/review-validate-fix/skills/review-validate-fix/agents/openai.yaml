interface:
  display_name: "Review Validate Fix"
  short_description: "Double-review, validate, fix, and hand off changes"
  default_prompt: "Use $review-validate-fix to run double review on current uncommitted changes or an explicitly provided manual review scope, merge findings, validate/fix real issues, and maintain a handoff.md artifact by default. Add 'skip review' or 'no handoff' to change those defaults."

policy:
  allow_implicit_invocation: false
